<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #202124;
      background: #fff;
    }

    .header {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #e8eaed;
    }
    .header-icon {
      width: 28px; height: 28px;
      background: #202124;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .header-title { font-weight: 700; font-size: 15px; }
    .header-sub { font-size: 11px; color: #5f6368; margin-top: 1px; }

    .section { padding: 12px 16px; border-bottom: 1px solid #e8eaed; }
    .section:last-child { border-bottom: none; }
    .section-label {
      font-size: 11px; font-weight: 600; color: #5f6368;
      text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 8px;
    }

    button {
      padding: 8px 12px;
      border: none; border-radius: 8px;
      font-size: 13px; font-family: inherit;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-primary { background: #f8c4d0; color: #fff; font-weight: 600; width: 100%; }
    .btn-primary:hover { background: #f4a7b9; }
    .btn-primary:disabled { background: #9aa0a6; cursor: default; }
    .btn-local { background: #4181d5; }
    .btn-local:hover:not(:disabled) { background: #1a73e8; }
    .btn-clip { background: #5f6368; }
    .btn-clip:hover:not(:disabled) { background: #3c4043; }
    .btn-small {
      padding: 5px 10px; font-size: 12px;
      background: #f1f3f4; color: #202124;
    }
    .btn-small:hover { background: #e8eaed; }
    .btn-danger { background: transparent; color: #ea4335; padding: 2px 6px; font-size: 12px; }
    .btn-danger:hover { background: #fce8e6; }

    /* Folder pickers */
    .folder-picker {
      display: none;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 8px;
    }
    .folder-picker.visible { display: flex; }
    .folder-option {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px;
      border: 1px solid #dadce0; border-radius: 8px;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .folder-option:hover { background: #f1f3f4; }
    .folder-option.drive-option.selected { border-color: #f8c4d0; background: #fdf0f4; }
    .folder-option.drive-option input[type=radio] { accent-color: #f8c4d0; }
    .folder-option.local-option.selected { border-color: #4181d5; background: #eef3fd; }
    .folder-option.local-option input[type=radio] { accent-color: #4181d5; }
    .folder-option-name { font-size: 12px; font-weight: 500; flex: 1; }
    .folder-option-id { font-size: 10px; color: #9aa0a6; }

    /* Folder list in settings */
    .folder-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
    .folder-item {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 8px;
      background: #f8f9fa; border-radius: 8px;
    }
    .folder-item-info { flex: 1; min-width: 0; }
    .folder-item-name { font-size: 12px; font-weight: 600; }
    .folder-item-id { font-size: 10px; color: #9aa0a6; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .add-folder-row { display: flex; flex-direction: column; gap: 6px; }
    .folder-input {
      width: 100%; padding: 7px 10px;
      border: 1px solid #dadce0; border-radius: 8px;
      font-size: 12px; font-family: inherit;
      outline: none;
    }
    .folder-input:focus { border-color: #34a853; }
    .add-row { display: flex; gap: 6px; }
    .add-row .folder-input { flex: 1; }

    .collapsible-label {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
    }
    .collapsible-label:hover { color: #202124; }
    .collapse-arrow { font-size: 9px; color: #9aa0a6; transition: transform 0.2s; }
    .collapse-arrow.collapsed { transform: rotate(180deg); }
    #foldersBody, #localFoldersBody { overflow: hidden; }
    #foldersBody.collapsed, #localFoldersBody.collapsed { display: none; }

    .hint { font-size: 11px; color: #80868b; margin-top: 4px; line-height: 1.4; }
    .status { font-size: 11px; color: #5f6368; padding: 2px 0; min-height: 16px; }
    .status.ok { color: #34a853; }
    .status.error { color: #ea4335; }

    /* Drive status dot */
    .drive-status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ea4335; flex-shrink: 0; margin-left: 2px;
      cursor: pointer; transition: background 0.2s, transform 0.15s;
      pointer-events: all;
    }
    .drive-status-dot:hover { transform: scale(1.25); }
    #saveBtn[aria-disabled="true"] { background: #9aa0a6; cursor: default; }
    #saveBtn[aria-disabled="true"] .drive-status-dot { cursor: pointer; }

    /* Column header labels */
    .col-header-label {
      font-size: 10px; font-weight: 700; letter-spacing: .3px; margin-bottom: 5px;
    }
    .col-header-label.drive { color: #e8829a; }
    .col-header-label.local { color: #4181d5; }

    /* Fieldset-style Add Folder button */
    .add-folder-fs {
      position: relative; width: 100%; border-radius: 5px;
      padding: 8px 0 6px; background: transparent; cursor: pointer;
      margin-top: 6px; font-family: inherit; transition: background 0.15s;
      display: block;
    }
    .add-folder-fs.drive { border: 1px solid #f8c4d0; }
    .add-folder-fs.drive:hover { background: #fdf0f4; }
    .add-folder-fs.local { border: 1px solid #a8c4f0; }
    .add-folder-fs.local:hover { background: #eef3fd; }
    .add-folder-fs-label {
      position: absolute; top: -7px; left: 50%; transform: translateX(-50%);
      background: #fff; padding: 0 5px; font-size: 10px; font-weight: 600;
      white-space: nowrap; pointer-events: none;
    }
    .add-folder-fs.drive .add-folder-fs-label { color: #e8829a; }
    .add-folder-fs.local .add-folder-fs-label { color: #4181d5; }

    /* Gear button */
    .gear-btn {
      background: transparent; border: none; cursor: pointer;
      font-size: 22px; color: #9aa0a6; padding: 2px 4px;
      border-radius: 6px; line-height: 1; flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    .gear-btn:hover { background: #f1f3f4; color: #5f6368; }

    /* Settings dropdown */
    .settings-dropdown {
      position: absolute; right: 0; top: calc(100% + 4px);
      background: #fff; border: 1px solid #e8eaed;
      border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      min-width: 188px; z-index: 200; overflow: hidden;
    }
    .settings-menu-item {
      display: flex; align-items: center; gap: 8px;
      width: 100%; text-align: left; padding: 9px 14px;
      font-size: 12px; background: transparent; border: none;
      cursor: pointer; color: #202124; font-family: inherit;
      transition: background 0.1s;
    }
    .settings-menu-item:hover:not(:disabled) { background: #f1f3f4; }
    .settings-menu-item:disabled { color: #bdc1c6; cursor: default; }
    .settings-menu-separator {
      height: 1px; background: #e8eaed; margin: 3px 0;
    }
  </style>
</head>
<body>
  <!-- Page preview -->
  <div class="section" id="pagePreviewSection">
    <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;">
      <img id="previewFavicon" width="14" height="14" style="border-radius:2px;flex-shrink:0;margin-top:2px;" src="" />
      <div id="previewTitle" style="font-size:12px;font-weight:600;color:#202124;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;flex:1;"></div>
      <div style="position:relative;flex-shrink:0;">
        <button id="settingsBtn" class="gear-btn" title="Settings">⚙</button>
        <div id="settingsDropdown" class="settings-dropdown" style="display:none;">
          <button id="driveConnectMenuItem" class="settings-menu-item">
            <span>🔗</span> Connect Google Drive
          </button>
          <button id="driveDisconnectMenuItem" class="settings-menu-item" disabled>
            <span>✕</span> Disconnect Google Drive
          </button>
        </div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:2px;font-size:11px;color:#5f6368;">
      <div id="previewSource" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></div>
      <div id="previewAuthor" style="display:none;"></div>
      <div id="previewPublished" style="display:none;"></div>
    </div>
    <div id="previewSnippet" style="display:none;font-size:11px;color:#80868b;margin-top:6px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;font-style:italic;"></div>

    <!-- MD full preview toggle -->
    <div style="margin-top:8px;">
      <button id="mdPreviewToggle" style="all:unset;cursor:pointer;font-size:10px;color:#9aa0a6;display:flex;align-items:center;gap:3px;">
        <span id="mdPreviewArrow">▶</span> MD Preview
      </button>
      <div id="mdPreviewBox" style="display:none;margin-top:6px;height:200px;overflow-y:auto;background:#f8f9fa;border-radius:8px;padding:8px 0 8px 8px;font-family:monospace;font-size:10px;color:#3c4043;line-height:1.5;white-space:pre-wrap;word-break:break-word;scrollbar-width:thin;">
        <span style="color:#9aa0a6;">Loading...</span>
      </div>
    </div>
  </div>

  <!-- Save buttons row -->
  <div class="section" style="padding-top:10px;padding-bottom:10px;">
    <div style="display:flex;gap:6px;">
      <button class="btn-primary" id="saveBtn" aria-disabled="true" style="flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:8px 6px;">
        <svg width="14" height="12" viewBox="0 0 87.3 78" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
          <path d="M6.6 66.85l3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3L27.5 53H0c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/>
          <path d="M43.65 25L29.9 1.2C28.55 2 27.4 3.1 26.6 4.5L1.2 48.5C.4 49.9 0 51.45 0 53h27.5z" fill="#00ac47"/>
          <path d="M73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75L86.1 57.5c.8-1.4 1.2-2.95 1.2-4.5H59.8l5.85 11.25z" fill="#ea4335"/>
          <path d="M43.65 25L57.4 1.2C56.05.4 54.5 0 52.9 0H34.4c-1.6 0-3.15.45-4.5 1.2z" fill="#00832d"/>
          <path d="M59.8 53H27.5L13.75 76.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" fill="#2684fc"/>
          <path d="M73.4 26.5l-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3L43.65 25 59.8 53h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/>
        </svg>
        Drive
        <span id="driveStatusDot" class="drive-status-dot" title="Not connected — click to connect"></span>
      </button>
      <button class="btn-primary btn-clip" id="copyClipBtn" style="flex:1;padding:8px 6px;">📋 Copy</button>
      <button class="btn-primary btn-local" id="saveLocalBtn" disabled style="flex:1;padding:8px 6px;">💻 Local</button>
    </div>
    <div id="saveStatusMsg" style="display:none;text-align:center;font-size:12px;font-weight:600;margin-top:8px;padding:6px;border-radius:8px;"></div>
  </div>

  <!-- Folder pickers + add (side by side, merged) -->
  <div class="section">
    <div style="display:flex;gap:10px;align-items:flex-start;">

      <!-- Drive column -->
      <div style="flex:1;min-width:0;">
        <div class="folder-picker" id="folderPicker"></div>
        <button id="addDriveToggle" class="add-folder-fs drive">
          <span class="add-folder-fs-label">☁ ＋ Add Folder</span>
        </button>
        <div id="addDriveForm" style="display:none;margin-top:10px;">
          <input class="folder-input" id="nameInput" placeholder="Label" style="font-size:11px;padding:5px 8px;margin-bottom:4px;" />
          <input class="folder-input" id="urlInput" placeholder="Folder URL or ID" style="font-size:11px;padding:5px 8px;" />
          <button class="btn-small" id="addBtn" style="margin-top:4px;width:100%;font-size:11px;">Add</button>
          <div class="status" id="addStatus"></div>
        </div>
      </div>

      <div style="width:1px;background:#e8eaed;align-self:stretch;flex-shrink:0;"></div>

      <!-- Local column -->
      <div style="flex:1;min-width:0;">
        <div class="folder-picker" id="localFolderPicker"></div>
        <button id="addLocalToggle" class="add-folder-fs local">
          <span class="add-folder-fs-label">💻 ＋ Add Folder</span>
        </button>
        <div id="addLocalForm" style="display:none;margin-top:10px;">
          <div class="hint" style="margin-bottom:6px;">先在 Finder → Downloads 里新建一个文件夹，再把名字填在下面。</div>
          <input class="folder-input" id="localPathInput" placeholder="e.g. NoteSource" style="font-size:11px;padding:5px 8px;" />
          <div id="localPathPreview" style="display:none;font-size:10px;color:#5f6368;margin-top:4px;">📁 ~/Downloads/<span id="localPathPreviewName" style="font-weight:600;"></span></div>
          <button class="btn-small" id="localAddBtn" style="margin-top:6px;width:100%;font-size:11px;">Add</button>
          <div class="status" id="localAddStatus"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="turndown.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
