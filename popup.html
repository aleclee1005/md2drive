<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #202124;
      background: #fff;
    }

    .header {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #e8eaed;
    }
    .header-icon {
      width: 28px; height: 28px;
      background: #34a853;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .header-title { font-weight: 700; font-size: 15px; }
    .header-sub { font-size: 11px; color: #5f6368; margin-top: 1px; }

    .section { padding: 12px 16px; border-bottom: 1px solid #e8eaed; }
    .section:last-child { border-bottom: none; }
    .section-label {
      font-size: 11px; font-weight: 600; color: #5f6368;
      text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 8px;
    }

    button {
      padding: 8px 12px;
      border: none; border-radius: 8px;
      font-size: 13px; font-family: inherit;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-primary { background: #34a853; color: #fff; font-weight: 600; width: 100%; }
    .btn-primary:hover { background: #2d9249; }
    .btn-primary:disabled { background: #9aa0a6; cursor: default; }
    .btn-small {
      padding: 5px 10px; font-size: 12px;
      background: #f1f3f4; color: #202124;
    }
    .btn-small:hover { background: #e8eaed; }
    .btn-danger { background: transparent; color: #ea4335; padding: 2px 6px; font-size: 12px; }
    .btn-danger:hover { background: #fce8e6; }

    /* Folder picker (shown when multiple folders) */
    #folderPicker {
      display: none;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 8px;
    }
    #folderPicker.visible { display: flex; }
    .folder-option {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px;
      border: 1px solid #dadce0; border-radius: 8px;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .folder-option:hover { background: #f1f3f4; }
    .folder-option.selected { border-color: #34a853; background: #e6f4ea; }
    .folder-option input[type=radio] { accent-color: #34a853; }
    .folder-option-name { font-size: 12px; font-weight: 500; flex: 1; }
    .folder-option-id { font-size: 10px; color: #9aa0a6; }

    /* Folder list in settings */
    .folder-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
    .folder-item {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 8px;
      background: #f8f9fa; border-radius: 8px;
    }
    .folder-item-info { flex: 1; min-width: 0; }
    .folder-item-name { font-size: 12px; font-weight: 600; }
    .folder-item-id { font-size: 10px; color: #9aa0a6; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .add-folder-row { display: flex; flex-direction: column; gap: 6px; }
    .folder-input {
      width: 100%; padding: 7px 10px;
      border: 1px solid #dadce0; border-radius: 8px;
      font-size: 12px; font-family: inherit;
      outline: none;
    }
    .folder-input:focus { border-color: #34a853; }
    .add-row { display: flex; gap: 6px; }
    .add-row .folder-input { flex: 1; }

    .collapsible-label {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
    }
    .collapsible-label:hover { color: #202124; }
    .collapse-arrow { font-size: 9px; color: #9aa0a6; transition: transform 0.2s; }
    .collapse-arrow.collapsed { transform: rotate(180deg); }
    #foldersBody { overflow: hidden; }
    #foldersBody.collapsed { display: none; }

    .hint { font-size: 11px; color: #80868b; margin-top: 4px; line-height: 1.4; }
    .status { font-size: 11px; color: #5f6368; padding: 2px 0; min-height: 16px; }
    .status.ok { color: #34a853; }
    .status.error { color: #ea4335; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
        <path d="M2 4h5l2 2h5v8H2V4z"/>
      </svg>
    </div>
    <div>
      <div class="header-title">Drive Sidebar</div>
      <div class="header-sub">Save any page as Markdown to Drive</div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Actions</div>

    <!-- Folder picker (shown when 2+ folders) -->
    <div id="folderPicker"></div>

    <button class="btn-primary" id="saveBtn" disabled>Save this page to Drive (MD)</button>
  </div>

  <div class="section">
    <div class="section-label collapsible-label" id="foldersToggle">
      Target Folders
      <span class="collapse-arrow" id="foldersArrow">▲</span>
    </div>

    <div id="foldersBody">
      <div class="folder-list" id="folderList"></div>

      <div class="add-folder-row">
        <input class="folder-input" id="nameInput" placeholder="Folder label (custom name)" />
        <div class="add-row">
          <input class="folder-input" id="urlInput" placeholder="Paste Drive folder URL or ID" />
          <button class="btn-small" id="addBtn">Add</button>
        </div>
      </div>

      <div class="status" id="addStatus"></div>
      <div class="hint">In Drive, right-click a folder → Copy link → paste above</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
